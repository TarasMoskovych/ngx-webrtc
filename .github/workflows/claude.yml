name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: npm ci

      - name: Start application
        if: github.event_name == 'issues'
        run: |
          npm run start -- --no-progress &
          npx wait-on http://localhost:4200 --timeout 60000

      - name: Install Playwright browsers
        if: github.event_name == 'issues'
        run: npx playwright install --with-deps chromium

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Required for Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Playwright MCP server — available for all events, active for issues
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--headless"]
                }
              }
            }

          # For issues: instruct Claude to verify the running app via Playwright.
          # For other events: leave empty so Claude uses the triggering comment instead.
          prompt: ${{ github.event_name == 'issues' && 'The application is running at http://localhost:4200. Use the Playwright MCP tool to navigate to http://localhost:4200 and verify the application is working correctly. Take a screenshot and post a comment on this issue summarizing what you observe on the page.' || '' }}
