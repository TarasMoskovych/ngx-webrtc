name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: npm ci

      - name: Start application
        if: github.event_name == 'issues'
        run: |
          npm run start -- --no-progress &
          npx wait-on http://localhost:4200 --timeout 60000

      - name: Install Playwright browsers
        if: github.event_name == 'issues'
        run: npx playwright install --with-deps chromium

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Required for Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Playwright MCP server — available for all events, active for issues
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--headless"]
                }
              }
            }

          # For issues: mandatory Playwright verification step before addressing the request.
          # For other events: leave empty so Claude uses the triggering comment instead.
          prompt: ${{ github.event_name == 'issues' && 'IMPORTANT: You MUST start by using the Playwright MCP tool for environment verification before doing anything else. Step 1 — check the production environment: navigate to https://tarasmoskovych.github.io/ngx-webrtc/ and take a screenshot. Step 2 — check the local environment: navigate to http://localhost:4200 and take a screenshot. Step 3 — compare both environments, include both screenshots and a summary of differences or issues observed in each. Only after completing verification of both environments should you proceed to address the request described in the issue.' || '' }}
